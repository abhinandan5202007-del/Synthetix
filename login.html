<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI Money Mentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,700&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style_animikh.css">
    <style>
        /* Internal styles to maintain the unique login layout while using global variables */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% -20%, rgba(240,180,41,0.1) 0%, var(--bg) 80%);
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Subtle grid background to match index.html */
        .login-page::before {
            content: '';
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 90%);
            pointer-events: none;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            animation: fadeUp 0.8s ease;
        }

        .login-header { text-align: center; margin-bottom: 2.5rem; }
        .login-header h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.2rem; 
            font-weight: 900;
            font-style: italic;
            margin-bottom: 0.5rem;
        }
        .login-header p { color: var(--muted); font-size: 0.9rem; letter-spacing: 0.02em; }

        /* Form Styling */
        .form-group { margin-bottom: 1.5rem; }
        .form-label { 
            display: block; 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            margin-bottom: 0.8rem;
            color: var(--teal);
            font-weight: 600;
        }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            border-color: var(--gold);
            background: rgba(240,180,41,0.05);
            outline: none;
            box-shadow: 0 0 20px rgba(240,180,41,0.1);
        }

        .login-btn {
            width: 100%;
            background: var(--gold);
            color: #000;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .login-btn:hover { background: #ffc940; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(240,180,41,0.3); }

        /* Social Links / Linkable Accounts */
        .social-divider {
            display: flex; align-items: center; text-align: center;
            margin: 2rem 0; color: var(--muted); font-size: 0.7rem;
            letter-spacing: 0.2em; text-transform: uppercase;
        }
        .social-divider::before, .social-divider::after {
            content: ''; flex: 1; border-bottom: 1px solid var(--border);
        }
        .social-divider:not(:empty)::before { margin-right: 1.5em; }
        .social-divider:not(:empty)::after { margin-left: 1.5em; }

        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .social-link {
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            background: transparent; border: 1px solid var(--border);
            padding: 0.8rem; border-radius: 12px;
            color: var(--text); font-size: 0.85rem; text-decoration: none;
            transition: all 0.3s; font-family: 'Space Grotesk', sans-serif;
        }
        .social-link:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .social-link img { width: 18px; filter: brightness(1.2); }

        .back-link {
            display: block; text-align: center; margin-top: 2rem;
            color: var(--muted); text-decoration: none; font-size: 0.8rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <h2>The Vault</h2>
            <p>Enter your credentials to access the terminal.</p>
        </div>

        <form>
            <div class="form-group">
                <label class="form-label">Full Identity Name</label>
                <input type="text" class="form-input" placeholder="e.g. Julian Sterling" required>
            </div>

            <div class="form-group">
                <label class="form-label">Enter your phone no</label>
                <input type="number" class="form-input" placeholder="e.g. 9854712023" required>
            </div>

            <div class="form-group">
                <label class="form-label">Secure Intelligence Email</label>
                <input type="email" class="form-input" placeholder="name@domain.com" required>
            </div>

            <button type="submit" class="login-btn">Authenticate Access</button>
        </form>

        <div class="social-divider">Connect Using</div>

        <div class="social-grid">
            <a href="#" class="social-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.747-.067-1.493-.187-2.213H12.48z"/></svg>
                Google
            </a>
            <a href="#" class="social-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.073 10.117c-.113-2.14 1.763-3.177 1.847-3.227-1.002-1.464-2.556-1.664-3.111-1.684-1.325-.135-2.584.779-3.257.779-.67 0-1.713-.762-2.822-.74-1.458.022-2.801.85-3.551 2.152-1.513 2.624-.388 6.51 1.077 8.627.717 1.036 1.57 2.2 2.686 2.158 1.076-.043 1.481-.696 2.781-.696 1.298 0 1.665.696 2.802.674 1.157-.022 1.905-1.048 2.616-2.088.823-1.201 1.163-2.362 1.182-2.424-.026-.011-2.276-.872-2.3-3.473-.021-2.179 1.785-3.227 1.849-3.264zM14.925 3.51c.594-.717.994-1.716.885-2.716-.86.035-1.899.572-2.516 1.288-.553.633-1.037 1.654-.908 2.63.957.075 1.939-.494 2.539-1.202z"/></svg>
                Apple
            </a>
        </div>

        <a href="index.html" class="back-link">← Return to Main Deck</a>
    </div>

</body>
<!-- Scroll Button -->
<button id="scrollBtn" title="Scroll">↓</button>

<style>
#scrollBtn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 100;
    background: var(--gold);
    color: #000;
    border: none;
    padding: 14px 16px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
}
#scrollBtn:hover {
    background: #ffc940;
    transform: translateY(-3px);
}
</style>

<script>
const scrollBtn = document.getElementById("scrollBtn");

window.addEventListener("scroll", () => {
    if (window.scrollY > 150) {
        scrollBtn.innerHTML = "↑"; // show up arrow
    } else {
        scrollBtn.innerHTML = "↓"; // show down arrow
    }
});

scrollBtn.addEventListener("click", () => {
    if (window.scrollY > 150) {
        window.scrollTo({ top: 0, behavior: "smooth" }); // scroll up
    } else {
        window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }); // scroll down
    }
});
</script>
</html>
